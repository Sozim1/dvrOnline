services:
  backend:
    build:
      context: ./backend
    container_name: camera-nvr-backend
    env_file:
      - .env
    environment:
      TZ: "${TZ:-America/Sao_Paulo}"
    ports:
      - "${BACKEND_BIND:-127.0.0.1}:${BACKEND_PORT:-4000}:4000"
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped
    networks:
      - camera-nvr

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "${PUBLIC_API_URL:-}"
    container_name: camera-nvr-frontend
    environment:
      TZ: "${TZ:-America/Sao_Paulo}"
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - camera-nvr

  mediamtx:
    image: bluenviron/mediamtx:1
    container_name: camera-nvr-mediamtx
    env_file:
      - .env
    environment:
      MTX_RTSPTRANSPORTS: tcp
      MTX_WEBRTCADDITIONALHOSTS: "${WEBRTC_ADDITIONAL_HOSTS:-127.0.0.1}"
      MTX_PATHS_MAIN_SOURCE: "${RTSP_MAIN}"
      MTX_PATHS_SUB_SOURCE: "${RTSP_SUB}"
      MTX_PATHS_MAIN_SOURCEONDEMAND: "no"
      MTX_PATHS_SUB_SOURCEONDEMAND: "no"
    ports:
      - "${WEBRTC_UDP_PORT:-8189}:8189/udp"
    restart: unless-stopped
    networks:
      - camera-nvr

networks:
  camera-nvr:
    driver: bridge
